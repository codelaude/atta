# Backend Framework Detection Rules
# Used by /init to identify backend frameworks, languages, and API patterns

# Python frameworks
python:
  # Django
  - name: Django
    identifier: django
    detection:
      files:
        - requirements.txt
        - pyproject.toml
        - Pipfile
      content_match:
        requirements.txt: "django"
        pyproject.toml: "django"
      project_indicators:
        - manage.py
        - settings.py
    version_detection:
      command: "python -c 'import django; print(django.get_version())'"
      fallback_file: requirements.txt
    metadata:
      type: backend_framework
      language: python
      api_pattern: rest
      needs_coordinator: true
      specialist_type: framework

  # Flask
  - name: Flask
    identifier: flask
    detection:
      files:
        - requirements.txt
        - pyproject.toml
      content_match:
        requirements.txt: "flask"
        pyproject.toml: "flask"
    metadata:
      type: backend_framework
      language: python
      api_pattern: rest
      needs_coordinator: true
      specialist_type: framework

  # FastAPI
  - name: FastAPI
    identifier: fastapi
    detection:
      files:
        - requirements.txt
        - pyproject.toml
      content_match:
        requirements.txt: "fastapi"
        pyproject.toml: "fastapi"
    metadata:
      type: backend_framework
      language: python
      api_pattern: rest
      needs_coordinator: true
      specialist_type: framework
      openapi: true

  # Pyramid
  - name: Pyramid
    identifier: pyramid
    detection:
      files:
        - requirements.txt
        - pyproject.toml
      content_match:
        requirements.txt: "pyramid"
        pyproject.toml: "pyramid"
    metadata:
      type: backend_framework
      language: python
      api_pattern: rest
      needs_coordinator: true
      specialist_type: framework

  # Python (Language)
  - name: Python
    identifier: python
    detection:
      files:
        - requirements.txt
        - pyproject.toml
        - Pipfile
        - setup.py
      file_patterns:
        - "**/*.py"
    version_detection:
      command: "python --version"
    metadata:
      type: language
      needs_coordinator: true
      specialist_type: language

# Java frameworks
java:
  # Spring Boot
  - name: Spring Boot
    identifier: spring-boot
    detection:
      files:
        - pom.xml
        - build.gradle
        - build.gradle.kts
      content_match:
        pom.xml: "spring-boot-starter"
        build.gradle: "spring-boot-starter"
      project_indicators:
        - src/main/java
        - src/main/resources/application.properties
        - src/main/resources/application.yml
    metadata:
      type: backend_framework
      language: java
      api_pattern: rest
      needs_coordinator: true
      specialist_type: framework

  # Micronaut
  - name: Micronaut
    identifier: micronaut
    detection:
      files:
        - build.gradle
        - pom.xml
      content_match:
        build.gradle: "micronaut"
        pom.xml: "micronaut"
    metadata:
      type: backend_framework
      language: java
      api_pattern: rest
      needs_coordinator: true
      specialist_type: framework

  # Quarkus
  - name: Quarkus
    identifier: quarkus
    detection:
      files:
        - pom.xml
        - build.gradle
      content_match:
        pom.xml: "quarkus"
        build.gradle: "quarkus"
    metadata:
      type: backend_framework
      language: java
      api_pattern: rest
      needs_coordinator: true
      specialist_type: framework

  # Java (Language)
  - name: Java
    identifier: java
    detection:
      files:
        - pom.xml
        - build.gradle
        - build.gradle.kts
      file_patterns:
        - "**/*.java"
    version_detection:
      command: "java -version"
    metadata:
      type: language
      needs_coordinator: true
      specialist_type: language

