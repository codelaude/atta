# C# / .NET frameworks
dotnet:
  # ASP.NET Core
  - name: ASP.NET Core
    identifier: aspnetcore
    detection:
      files:
        - "*.csproj"
      content_match:
        "*.csproj": "Microsoft.AspNetCore"
    metadata:
      type: backend_framework
      language: csharp
      api_pattern: rest
      needs_coordinator: true
      specialist_type: framework

  # C# (Language)
  - name: C#
    identifier: csharp
    detection:
      files:
        - "*.csproj"
        - "*.sln"
      file_patterns:
        - "**/*.cs"
    version_detection:
      command: "dotnet --version"
    metadata:
      type: language
      needs_coordinator: true
      specialist_type: language

# API Patterns
api_patterns:
  # GraphQL
  - name: GraphQL
    identifier: graphql
    detection:
      package_json:
        dependencies:
          - graphql
          - apollo-server
          - apollo-server-express
          - "@apollo/server"
      files:
        - requirements.txt
        - Cargo.toml
        - pom.xml
        - Gemfile
      content_match:
        requirements.txt: "graphene"
        Cargo.toml: "juniper"
        pom.xml: "graphql-java"
        Gemfile: "graphql"
    metadata:
      type: api_pattern
      specialist_type: api

  # gRPC
  - name: gRPC
    identifier: grpc
    detection:
      package_json:
        dependencies:
          - "@grpc/grpc-js"
      files:
        - requirements.txt
        - go.mod
        - Cargo.toml
        - pom.xml
      content_match:
        requirements.txt: "grpcio"
        go.mod: "google.golang.org/grpc"
        Cargo.toml: "tonic"
        pom.xml: "grpc-java"
    metadata:
      type: api_pattern
      specialist_type: api

  # REST
  - name: REST API
    identifier: rest
    detection:
      # Default if backend framework detected but no specific API pattern
      default: true
    metadata:
      type: api_pattern
      specialist_type: api

# API Documentation
api_docs:
  # Swagger/OpenAPI
  - name: Swagger/OpenAPI
    identifier: swagger
    detection:
      package_json:
        dependencies:
          - swagger-ui-express
          - "@nestjs/swagger"
      files:
        - openapi.yaml
        - openapi.json
        - swagger.yaml
        - swagger.json
    metadata:
      type: api_documentation
      specialist_type: docs
