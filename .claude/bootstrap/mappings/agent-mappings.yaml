# Agent Mappings
# Maps detected technologies → agent templates + variables
# Used by generator.md to create specialized agents
#
# CORE AGENTS (pre-existing, NOT generated by bootstrap):
# These agents exist as static .md files in agents/ root and do NOT
# need generation. They are referenced by mcp-mappings.yaml and skills.
#
#   project-owner    — Strategic coordinator, escalation endpoint
#   librarian        — Knowledge capture and directive management
#   rubber-duck      — Brainstorming and problem decomposition
#   code-reviewer    — Code review and quality checks
#   qa-validator     — Quality assurance and validation
#   business-analyst — Requirements and business logic analysis
#   pr-manager       — Pull request workflow management
#
# These core agents are always available regardless of detected tech stack.

# Coordinator Mappings (always generated when applicable)
coordinators:
  fe-team-lead:
    condition: has_frontend
    template: fe-team-lead.template.md
    output: agents/coordinators/fe-team-lead.md
    variables:
      COORDINATOR_NAME: "FE Team Lead"
      COORDINATOR_ROLE: "Frontend Coordinator"
      DOMAIN: "frontend"
      # FRONTEND_SPECIALISTS: Auto-populated by generator from detected frontend_frameworks,
      #   styling, and testing specialists. Format: [{domain: "Vue.js", agent: "vue"}, ...]
      # FRAMEWORK_SPECIALIST, STYLING_SPECIALIST, TYPE_SPECIALIST, TESTING_SPECIALIST:
      #   Auto-populated from detected stack (e.g., "vue", "scss", "typescript", "jest")

  be-team-lead:
    condition: has_backend
    template: be-team-lead.template.md
    output: agents/coordinators/be-team-lead.md
    variables:
      COORDINATOR_NAME: "BE Team Lead"
      COORDINATOR_ROLE: "Backend Coordinator"
      DOMAIN: "backend"
      # BACKEND_SPECIALISTS: Auto-populated by generator from detected backend_frameworks,
      #   databases, and testing specialists. Format: [{domain: "Python", agent: "python"}, ...]
      # LANGUAGE_SPECIALIST, DATABASE_SPECIALIST, API_SPECIALIST, TESTING_SPECIALIST:
      #   Auto-populated from detected stack (e.g., "python", "postgresql", "rest", "pytest")

# Frontend Framework Specialists
frontend_frameworks:
  vue:
    template: framework-specialist.template.md
    output: agents/specialists/vue.md
    pattern_file: patterns/vue-patterns.md
    variables:
      FRAMEWORK_NAME: "Vue.js"
      FRAMEWORK_ID: "vue"
      FRAMEWORK_TYPE: "frontend"
      COMPONENT_MODEL: "reactive"
      DOCUMENTATION_URLS: "https://vuejs.org/api/, https://vueuse.org"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use Composition API with `<script setup>` for Vue 3"
      - "Use `ref()` for primitives, `reactive()` for objects"
      - "Props should be defined with `defineProps()` and TypeScript interfaces"
      - "Emit events with `defineEmits()` and type-safe signatures"
      - "Use `computed()` for derived state"
      - "Lifecycle hooks: `onMounted()`, `onUnmounted()`, etc."
    anti_patterns:
      - pattern: "Using Options API in new Vue 3 code"
        fix: "Use Composition API with `<script setup>`"
        severity: "HIGH"
      - pattern: "Mutating props directly"
        fix: "Emit events to parent for state changes"
        severity: "CRITICAL"
      - pattern: "Using `any` type for props"
        fix: "Define proper TypeScript interfaces"
        severity: "HIGH"

  react:
    template: framework-specialist.template.md
    output: agents/specialists/react.md
    pattern_file: patterns/react-patterns.md
    variables:
      FRAMEWORK_NAME: "React"
      FRAMEWORK_ID: "react"
      FRAMEWORK_TYPE: "frontend"
      COMPONENT_MODEL: "hooks"
      DOCUMENTATION_URLS: "https://react.dev"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use functional components with hooks"
      - "useState for local state, useReducer for complex state"
      - "useEffect for side effects, return cleanup function"
      - "useMemo for expensive computations, useCallback for function memoization"
      - "Custom hooks for reusable logic"
      - "Props should be TypeScript interfaces"
    anti_patterns:
      - pattern: "Using class components in new code"
        fix: "Use functional components with hooks"
        severity: "HIGH"
      - pattern: "Missing dependency array in useEffect"
        fix: "Always specify dependencies or use empty array"
        severity: "CRITICAL"
      - pattern: "Inline object/array in dependency array"
        fix: "Use useMemo or move outside component"
        severity: "HIGH"

  nextjs:
    template: framework-specialist.template.md
    output: agents/specialists/nextjs.md
    pattern_file: patterns/nextjs-patterns.md
    variables:
      FRAMEWORK_NAME: "Next.js"
      FRAMEWORK_ID: "nextjs"
      FRAMEWORK_TYPE: "frontend"
      COMPONENT_MODEL: "hooks"
      EXTENDS: "react"
      DOCUMENTATION_URLS: "https://nextjs.org/docs"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use App Router for new projects (Next.js 13+)"
      - "Server Components by default, Client Components when needed ('use client')"
      - "Use getServerSideProps/getStaticProps for data fetching (Pages Router)"
      - "Use async components and fetch for data (App Router)"
      - "Image optimization with next/image"
      - "Route segments with folders, page.tsx for routes"
    anti_patterns:
      - pattern: "Using Pages Router for new projects"
        fix: "Use App Router (app/ directory)"
        severity: "MEDIUM"
      - pattern: "Client-side data fetching for static content"
        fix: "Use Server Components and fetch directly"
        severity: "HIGH"

  angular:
    template: framework-specialist.template.md
    output: agents/specialists/angular.md
    pattern_file: patterns/angular-patterns.md
    variables:
      FRAMEWORK_NAME: "Angular"
      FRAMEWORK_ID: "angular"
      FRAMEWORK_TYPE: "frontend"
      COMPONENT_MODEL: "decorators"
      DOCUMENTATION_URLS: "https://angular.io/docs"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use standalone components (Angular 14+)"
      - "Signals for reactive state (Angular 16+)"
      - "Dependency injection via constructor"
      - "RxJS observables for async operations"
      - "OnPush change detection strategy"
      - "Strict typing with TypeScript"
    anti_patterns:
      - pattern: "NgModules for new components"
        fix: "Use standalone components"
        severity: "MEDIUM"
      - pattern: "Not unsubscribing from observables"
        fix: "Use async pipe or takeUntil pattern"
        severity: "CRITICAL"

  svelte:
    template: framework-specialist.template.md
    output: agents/specialists/svelte.md
    pattern_file: patterns/svelte-patterns.md
    variables:
      FRAMEWORK_NAME: "Svelte"
      FRAMEWORK_ID: "svelte"
      FRAMEWORK_TYPE: "frontend"
      COMPONENT_MODEL: "compiler"
      DOCUMENTATION_URLS: "https://svelte.dev/docs"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Reactive declarations with `$:` label"
      - "Two-way binding with `bind:value`"
      - "Event handlers with `on:click`"
      - "Stores for global state"
      - "Transitions and animations built-in"
    anti_patterns:
      - pattern: "Manual DOM manipulation"
        fix: "Use Svelte's reactive declarations"
        severity: "HIGH"

# Styling Specialists
styling:
  scss:
    template: styling-specialist.template.md
    output: agents/specialists/scss.md
    pattern_file: patterns/scss-patterns.md
    variables:
      STYLING_NAME: "SCSS"
      STYLING_ID: "scss"
      PREPROCESSOR: "true"
      METHODOLOGY: "BEM"
      DOCUMENTATION_URLS: "https://sass-lang.com/documentation"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use BEM naming convention: block__element--modifier"
      - "Variables for colors, spacing, breakpoints"
      - "Mixins for reusable styles"
      - "Nesting max 3 levels deep"
      - "Mobile-first media queries"
    anti_patterns:
      - pattern: "Deep nesting (>3 levels)"
        fix: "Flatten structure, use BEM"
        severity: "HIGH"
      - pattern: "@import statements"
        fix: "Use @use and @forward"
        severity: "MEDIUM"

  tailwind:
    template: styling-specialist.template.md
    output: agents/specialists/tailwind.md
    pattern_file: patterns/tailwind-patterns.md
    variables:
      STYLING_NAME: "Tailwind CSS"
      STYLING_ID: "tailwind"
      UTILITY_FIRST: "true"
      DOCUMENTATION_URLS: "https://tailwindcss.com/docs"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Utility classes over custom CSS"
      - "Use @apply sparingly, prefer composition"
      - "Custom values in tailwind.config.js"
      - "Group related utilities with plugin order"
      - "Responsive modifiers: sm:, md:, lg:"
    anti_patterns:
      - pattern: "Overusing @apply"
        fix: "Use utility classes directly or create components"
        severity: "MEDIUM"
      - pattern: "Inline style attributes"
        fix: "Use Tailwind utility classes"
        severity: "HIGH"

# Language Specialists
languages:
  typescript:
    template: language-specialist.template.md
    output: agents/specialists/typescript.md
    pattern_file: patterns/typescript-patterns.md
    variables:
      LANGUAGE_NAME: "TypeScript"
      LANGUAGE_ID: "typescript"
      TYPED: "true"
      DOCUMENTATION_URLS: "https://www.typescriptlang.org/docs/"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Strict mode enabled in tsconfig.json"
      - "Interfaces for object shapes, types for unions/primitives"
      - "Avoid `any`, use `unknown` if needed"
      - "Use generics for reusable type-safe code"
      - "Type guards for runtime type checking"
      - "Utility types: Partial, Pick, Omit, Record"
    anti_patterns:
      - pattern: "Using `any` type"
        fix: "Use proper types or `unknown` with type guards"
        severity: "CRITICAL"
      - pattern: "Type assertions without validation"
        fix: "Use type guards or runtime validation"
        severity: "HIGH"
      - pattern: "`@ts-ignore` comments"
        fix: "Fix the type issue properly"
        severity: "HIGH"

  python:
    template: language-specialist.template.md
    output: agents/specialists/python.md
    pattern_file: patterns/python-patterns.md
    variables:
      LANGUAGE_NAME: "Python"
      LANGUAGE_ID: "python"
      TYPED: "optional"
      DOCUMENTATION_URLS: "https://docs.python.org/3/"
      TEAM_LEAD: "be-team-lead"
    rules:
      - "Type hints for function signatures"
      - "List comprehensions over loops when readable"
      - "Context managers for resource handling"
      - "Virtual environments for dependencies"
      - "PEP 8 style guide"
      - "Docstrings for modules, classes, functions"
    anti_patterns:
      - pattern: "Bare `except:` clause"
        fix: "Catch specific exceptions"
        severity: "CRITICAL"
      - pattern: "Mutable default arguments"
        fix: "Use None and initialize in function body"
        severity: "CRITICAL"
      - pattern: "Global state without necessity"
        fix: "Use function parameters and return values"
        severity: "HIGH"

  java:
    template: language-specialist.template.md
    output: agents/specialists/java.md
    pattern_file: patterns/java-patterns.md
    variables:
      LANGUAGE_NAME: "Java"
      LANGUAGE_ID: "java"
      TYPED: "true"
      DOCUMENTATION_URLS: "https://docs.oracle.com/en/java/"
      TEAM_LEAD: "be-team-lead"
    rules:
      - "Follow Java naming conventions (camelCase, PascalCase)"
      - "Prefer composition over inheritance"
      - "Use interfaces for contracts"
      - "Streams API for collection operations"
      - "Try-with-resources for auto-closeable"
      - "Optional instead of null"
    anti_patterns:
      - pattern: "Returning null"
        fix: "Use Optional<T>"
        severity: "HIGH"
      - pattern: "Catching generic Exception"
        fix: "Catch specific exceptions"
        severity: "HIGH"
      - pattern: "Not closing resources"
        fix: "Use try-with-resources"
        severity: "CRITICAL"

  go:
    template: language-specialist.template.md
    output: agents/specialists/go.md
    pattern_file: patterns/go-patterns.md
    variables:
      LANGUAGE_NAME: "Go"
      LANGUAGE_ID: "go"
      TYPED: "true"
      DOCUMENTATION_URLS: "https://go.dev/doc/"
      TEAM_LEAD: "be-team-lead"
    rules:
      - "Error handling: return errors, don't panic"
      - "Use interfaces for abstractions"
      - "Goroutines for concurrency, channels for communication"
      - "Context for cancellation and timeouts"
      - "Defer for cleanup"
      - "gofmt for formatting"
    anti_patterns:
      - pattern: "Ignoring errors"
        fix: "Check and handle all errors"
        severity: "CRITICAL"
      - pattern: "Shared memory without synchronization"
        fix: "Use channels or sync primitives"
        severity: "CRITICAL"
      - pattern: "Panic in libraries"
        fix: "Return errors instead"
        severity: "HIGH"

# Backend Framework Specialists
backend_frameworks:
  django:
    template: framework-specialist.template.md
    output: agents/specialists/django.md
    pattern_file: patterns/django-patterns.md
    variables:
      FRAMEWORK_NAME: "Django"
      FRAMEWORK_ID: "django"
      FRAMEWORK_TYPE: "backend"
      LANGUAGE: "python"
      API_PATTERN: "REST"
      DOCUMENTATION_URLS: "https://docs.djangoproject.com/"
      TEAM_LEAD: "be-team-lead"
    rules:
      - "Use Django ORM for database operations"
      - "Class-based views for complex logic"
      - "Django REST Framework for APIs"
      - "Migrations for all schema changes"
      - "Settings per environment (dev, staging, prod)"
      - "Use Django's auth system"
    anti_patterns:
      - pattern: "Raw SQL queries"
        fix: "Use Django ORM"
        severity: "HIGH"
      - pattern: "Logic in templates"
        fix: "Move to views or model methods"
        severity: "MEDIUM"

  fastapi:
    template: framework-specialist.template.md
    output: agents/specialists/fastapi.md
    pattern_file: patterns/fastapi-patterns.md
    variables:
      FRAMEWORK_NAME: "FastAPI"
      FRAMEWORK_ID: "fastapi"
      FRAMEWORK_TYPE: "backend"
      LANGUAGE: "python"
      API_PATTERN: "REST"
      ASYNC: "true"
      DOCUMENTATION_URLS: "https://fastapi.tiangolo.com"
      TEAM_LEAD: "be-team-lead"
    rules:
      - "Use Pydantic models for request/response"
      - "Async/await for I/O operations"
      - "Dependency injection for shared logic"
      - "Path operations with type hints"
      - "Automatic OpenAPI documentation"
    anti_patterns:
      - pattern: "Sync I/O in async endpoints"
        fix: "Use async libraries or run_in_executor"
        severity: "CRITICAL"
      - pattern: "Missing response models"
        fix: "Define Pydantic response models"
        severity: "HIGH"

  spring-boot:
    template: framework-specialist.template.md
    output: agents/specialists/spring-boot.md
    pattern_file: patterns/spring-boot-patterns.md
    variables:
      FRAMEWORK_NAME: "Spring Boot"
      FRAMEWORK_ID: "spring-boot"
      FRAMEWORK_TYPE: "backend"
      LANGUAGE: "java"
      API_PATTERN: "REST"
      DOCUMENTATION_URLS: "https://spring.io/projects/spring-boot"
      TEAM_LEAD: "be-team-lead"
    rules:
      - "Dependency injection with @Autowired or constructor injection"
      - "@RestController for API endpoints"
      - "Service layer for business logic"
      - "Repository pattern for data access"
      - "application.properties for configuration"
      - "Use Spring Data JPA"
    anti_patterns:
      - pattern: "Field injection with @Autowired"
        fix: "Use constructor injection"
        severity: "MEDIUM"
      - pattern: "Business logic in controllers"
        fix: "Move to service layer"
        severity: "HIGH"

  express:
    template: framework-specialist.template.md
    output: agents/specialists/express.md
    pattern_file: patterns/express-patterns.md
    variables:
      FRAMEWORK_NAME: "Express"
      FRAMEWORK_ID: "express"
      FRAMEWORK_TYPE: "backend"
      LANGUAGE: "nodejs"
      API_PATTERN: "REST"
      DOCUMENTATION_URLS: "https://expressjs.com"
      TEAM_LEAD: "be-team-lead"
    rules:
      - "Middleware for cross-cutting concerns"
      - "Router for route organization"
      - "Error-handling middleware"
      - "Async/await with try-catch or async handler wrapper"
      - "Environment variables for config"
    anti_patterns:
      - pattern: "Sync operations blocking event loop"
        fix: "Use async operations"
        severity: "CRITICAL"
      - pattern: "Not handling promise rejections"
        fix: "Use try-catch or error middleware"
        severity: "CRITICAL"

# Database Specialists
databases:
  postgresql:
    template: database-specialist.template.md
    output: agents/specialists/postgresql.md
    pattern_file: patterns/database-patterns.md
    variables:
      DATABASE_NAME: "PostgreSQL"
      DATABASE_ID: "postgresql"
      DATABASE_TYPE: "sql"
      DOCUMENTATION_URLS: "https://www.postgresql.org/docs/"
      TEAM_LEAD: "be-team-lead"
      SLOW_QUERY_THRESHOLD: "100"
    rules:
      - "Use parameterized queries (prevent SQL injection)"
      - "Indexes on foreign keys and frequent lookups"
      - "Transactions for atomic operations"
      - "Migrations for schema changes"
      - "Connection pooling for performance"
    anti_patterns:
      - pattern: "String concatenation in queries"
        fix: "Use parameterized queries"
        severity: "CRITICAL"
      - pattern: "Missing indexes on FK columns"
        fix: "Add indexes"
        severity: "HIGH"

  mongodb:
    template: database-specialist.template.md
    output: agents/specialists/mongodb.md
    pattern_file: patterns/database-patterns.md
    variables:
      DATABASE_NAME: "MongoDB"
      DATABASE_ID: "mongodb"
      DATABASE_TYPE: "nosql"
      DOCUMENTATION_URLS: "https://docs.mongodb.com"
      TEAM_LEAD: "be-team-lead"
      SLOW_QUERY_THRESHOLD: "100"
    rules:
      - "Design schema for query patterns"
      - "Indexes for common queries"
      - "Aggregation pipeline for complex queries"
      - "Limit result sets, use pagination"
      - "Use lean() for read-only queries"
    anti_patterns:
      - pattern: "N+1 query pattern"
        fix: "Use populate or aggregation"
        severity: "HIGH"
      - pattern: "Missing indexes on query fields"
        fix: "Add indexes"
        severity: "HIGH"

# Testing Specialists
testing:
  jest:
    template: testing-specialist.template.md
    output: agents/specialists/jest.md
    pattern_file: patterns/testing-patterns.md
    variables:
      TESTING_NAME: "Jest"
      TESTING_ID: "jest"
      TESTING_TYPE: "unit"
      DOCUMENTATION_URLS: "https://jestjs.io/docs/getting-started"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Describe blocks for grouping tests"
      - "Test one thing per test case"
      - "Mock external dependencies"
      - "Use beforeEach/afterEach for setup/cleanup"
      - "Aim for high coverage, prioritize critical paths"
    anti_patterns:
      - pattern: "Testing implementation details"
        fix: "Test behavior and outputs"
        severity: "MEDIUM"
      - pattern: "Not cleaning up after tests"
        fix: "Use afterEach for cleanup"
        severity: "HIGH"

  pytest:
    template: testing-specialist.template.md
    output: agents/specialists/pytest.md
    pattern_file: patterns/testing-patterns.md
    variables:
      TESTING_NAME: "pytest"
      TESTING_ID: "pytest"
      TESTING_TYPE: "unit"
      DOCUMENTATION_URLS: "https://docs.pytest.org/"
      TEAM_LEAD: "be-team-lead"
    rules:
      - "Use fixtures for setup/teardown"
      - "Test one thing per test function"
      - "Mock external dependencies with pytest-mock"
      - "Parametrize for multiple test cases"
      - "Use markers for test organization"
    anti_patterns:
      - pattern: "State leaking between tests"
        fix: "Use fixtures for isolation"
        severity: "CRITICAL"
      - pattern: "Not testing error cases"
        fix: "Test both success and failure paths"
        severity: "HIGH"

# E2E Testing Specialists (generated when a framework with triggers_e2e_specialist is detected)
e2e_testing:
  cypress:
    condition: has_e2e_tools
    template: e2e-testing-specialist.template.md
    output: agents/specialists/cypress-e2e.md
    pattern_file: patterns/e2e-testing-patterns.md
    variables:
      E2E_FRAMEWORK_NAME: "Cypress"
      E2E_FRAMEWORK_ID: "cypress"
      E2E_DIR: "cypress"
      EXT: "js"
      DOCUMENTATION_URLS: "https://docs.cypress.io/"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use `cy.intercept()` for network stubbing — never `cy.route()`"
      - "Prefer `data-testid` selectors over CSS classes"
      - "Use `cy.session()` for authentication caching across tests"
      - "Avoid `cy.wait(ms)` — use `cy.intercept()` aliases instead"
      - "Keep tests independent — no order dependencies"
      - "Use `beforeEach` for test isolation, not `before`"
    anti_patterns:
      - pattern: "Using `cy.wait(2000)` for timing"
        fix: "Use `cy.intercept()` with alias: `cy.wait('@apiCall')`"
        severity: "HIGH"
      - pattern: "Chaining unrelated assertions in one test"
        fix: "Split into separate `it()` blocks for clear failures"
        severity: "MEDIUM"
      - pattern: "Using `cy.get('.css-class')` selectors"
        fix: "Use `cy.get('[data-testid=\"element\"]')` or `cy.findByRole()`"
        severity: "HIGH"
      - pattern: "Sharing state between tests via `before()`"
        fix: "Use `beforeEach()` for full isolation"
        severity: "CRITICAL"

  playwright:
    condition: has_e2e_tools
    template: e2e-testing-specialist.template.md
    output: agents/specialists/playwright-e2e.md
    pattern_file: patterns/e2e-testing-patterns.md
    variables:
      E2E_FRAMEWORK_NAME: "Playwright"
      E2E_FRAMEWORK_ID: "playwright"
      E2E_DIR: "tests"
      EXT: "ts"
      DOCUMENTATION_URLS: "https://playwright.dev/docs/intro"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use `page.getByRole()` and `page.getByTestId()` for selectors"
      - "Use `test.describe()` for grouping related tests"
      - "Leverage auto-waiting — avoid explicit waits"
      - "Use `page.route()` for network mocking"
      - "Use `test.use({ storageState })` for auth caching"
      - "Run tests in parallel by default"
    anti_patterns:
      - pattern: "Using `page.waitForTimeout(ms)` for timing"
        fix: "Use `page.waitForSelector()` or auto-waiting locators"
        severity: "HIGH"
      - pattern: "Using CSS selectors directly"
        fix: "Use `getByRole()`, `getByTestId()`, or `getByText()`"
        severity: "HIGH"
      - pattern: "Not using test fixtures for setup"
        fix: "Use Playwright fixtures for reusable setup/teardown"
        severity: "MEDIUM"
      - pattern: "Sequential test execution in CI"
        fix: "Enable `fullyParallel: true` in playwright.config"
        severity: "MEDIUM"

  puppeteer:
    condition: has_e2e_tools
    template: e2e-testing-specialist.template.md
    output: agents/specialists/puppeteer-e2e.md
    pattern_file: patterns/e2e-testing-patterns.md
    variables:
      E2E_FRAMEWORK_NAME: "Puppeteer"
      E2E_FRAMEWORK_ID: "puppeteer"
      E2E_DIR: "tests/e2e"
      EXT: "js"
      DOCUMENTATION_URLS: "https://pptr.dev/"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use `page.waitForSelector()` instead of `page.waitForTimeout()`"
      - "Close browser in `afterAll` to prevent resource leaks"
      - "Use `page.setRequestInterception()` for network control"
      - "Set explicit viewport with `page.setViewport()`"
      - "Use `page.$eval()` for single-element queries, `page.$$eval()` for collections"
      - "Handle navigation with `page.waitForNavigation()` alongside click actions"
    anti_patterns:
      - pattern: "Using `page.waitForTimeout(ms)` for timing"
        fix: "Use `page.waitForSelector()` or `page.waitForFunction()`"
        severity: "HIGH"
      - pattern: "Not closing browser after tests"
        fix: "Always call `browser.close()` in teardown"
        severity: "HIGH"
      - pattern: "Missing error handling for navigation"
        fix: "Wrap navigation in try/catch, use `waitForNavigation()`"
        severity: "MEDIUM"
      - pattern: "Hardcoded URLs"
        fix: "Use base URL config and relative paths"
        severity: "MEDIUM"

  selenium:
    condition: has_e2e_tools
    template: e2e-testing-specialist.template.md
    output: agents/specialists/selenium-e2e.md
    pattern_file: patterns/e2e-testing-patterns.md
    variables:
      E2E_FRAMEWORK_NAME: "Selenium"
      E2E_FRAMEWORK_ID: "selenium"
      E2E_DIR: "tests/e2e"
      DOCUMENTATION_URLS: "https://www.selenium.dev/documentation/"
      TEAM_LEAD: "fe-team-lead"
      # Note: EXT intentionally omitted — Selenium is multi-language (JS, Java, Python, C#, Ruby).
      # The template should adapt examples to the project's detected language.
    rules:
      - "Use explicit waits — never fixed sleeps or implicit waits"
      - "Use Page Object Model for all page interactions"
      - "Prefer ID and CSS selectors over XPath"
      - "Close WebDriver in teardown — prevent zombie browsers"
      - "Use WebDriver Manager for automatic driver management"
      - "Set explicit timeouts on driver initialization"
    anti_patterns:
      - pattern: "Using fixed sleeps or implicit waits"
        fix: "Use explicit waits with expected conditions"
        severity: "CRITICAL"
      - pattern: "Using XPath for simple selectors"
        fix: "Use CSS selectors or ID-based locators"
        severity: "MEDIUM"
      - pattern: "Not quitting WebDriver after tests"
        fix: "Always call `driver.quit()` in teardown"
        severity: "HIGH"
      - pattern: "Hardcoded browser driver paths"
        fix: "Use WebDriver Manager or environment variables"
        severity: "MEDIUM"

  webdriverio:
    condition: has_e2e_tools
    template: e2e-testing-specialist.template.md
    output: agents/specialists/webdriverio-e2e.md
    pattern_file: patterns/e2e-testing-patterns.md
    variables:
      E2E_FRAMEWORK_NAME: "WebdriverIO"
      E2E_FRAMEWORK_ID: "webdriverio"
      E2E_DIR: "test"
      EXT: "js"
      DOCUMENTATION_URLS: "https://webdriver.io/docs/gettingstarted"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Use `$()` and `$$()` shorthand for element queries"
      - "Leverage built-in `waitForDisplayed()` and `waitForClickable()`"
      - "Use `browser.url()` with base URL from config"
      - "Use `wdio.conf.js` services for automatic setup (chromedriver, etc.)"
      - "Group tests with `describe` and use `beforeEach` for isolation"
      - "Use `addCommand()` for reusable custom commands"
    anti_patterns:
      - pattern: "Using `browser.pause(ms)` for timing"
        fix: "Use `waitForDisplayed()`, `waitForExist()`, or `waitUntil()`"
        severity: "HIGH"
      - pattern: "Not using Page Object pattern"
        fix: "Create page objects extending `Page` class"
        severity: "MEDIUM"
      - pattern: "Hardcoded selectors in test files"
        fix: "Encapsulate selectors in page objects"
        severity: "MEDIUM"
      - pattern: "Missing `wdio.conf.js` service configuration"
        fix: "Configure services for automatic driver management"
        severity: "LOW"

# Security Specialist (generated when a tool with triggers_security_specialist is detected)
security:
  security-specialist:
    condition: has_security_tools
    template: security-specialist.template.md
    output: agents/specialists/security-specialist.md
    pattern_file: patterns/security-patterns.md
    variables:
      SPECIALIST_NAME: "Security Specialist"
      SPECIALIST_ID: "security-specialist"
      DOCUMENTATION_URLS: "https://owasp.org/Top10/2025/"
      # TEAM_LEAD: Auto-populated by generator (fe-team-lead or be-team-lead, whichever exists)
    rules:
      - "OWASP Top 10 (2025) compliance checks"
      - "No hardcoded secrets, API keys, or tokens in source"
      - "Parameterized queries only — no SQL string concatenation"
      - "Input validation at all system boundaries"
      - "HTTPS enforced, no mixed content"
      - "Proper error handling — no leaked stack traces"
    anti_patterns:
      - pattern: "Hardcoded API keys or secrets"
        fix: "Use environment variables or secrets manager"
        severity: "CRITICAL"
      - pattern: "eval() or exec() with user input"
        fix: "Use safe alternatives (JSON.parse, AST-based parsing)"
        severity: "CRITICAL"
      - pattern: "SQL string concatenation"
        fix: "Use parameterized queries or ORM"
        severity: "CRITICAL"
      - pattern: "v-html or dangerouslySetInnerHTML with unsanitized data"
        fix: "Sanitize with DOMPurify or equivalent"
        severity: "CRITICAL"

# Accessibility Specialist (always generated for frontend projects)
accessibility:
  accessibility:
    condition: has_frontend
    template: accessibility-specialist.template.md
    output: agents/specialists/accessibility.md
    pattern_file: patterns/accessibility-patterns.md
    variables:
      SPECIALIST_NAME: "Accessibility"
      SPECIALIST_ID: "accessibility"
      STANDARDS: "WCAG 2.1 AA"
      DOCUMENTATION_URLS: "https://www.w3.org/WAI/WCAG21/quickref/, https://www.w3.org/WAI/ARIA/apg/"
      TEAM_LEAD: "fe-team-lead"
    rules:
      - "Semantic HTML elements"
      - "ARIA labels for screen readers"
      - "Keyboard navigation support"
      - "Color contrast ratios (4.5:1 for text)"
      - "Focus management"
      - "Alt text for images"
    anti_patterns:
      - pattern: "Non-semantic div/span soup"
        fix: "Use semantic HTML5 elements"
        severity: "HIGH"
      - pattern: "Missing alt attributes"
        fix: "Add descriptive alt text"
        severity: "CRITICAL"
      - pattern: "Keyboard traps"
        fix: "Ensure tab navigation works"
        severity: "CRITICAL"
