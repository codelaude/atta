# Custom MCP
custom_mcp:
  enabled_by_default: false
  priority: low
  description: "User-specified MCP server"

  user_defined:
    agents_with_access:
      - project-owner
    recommendation_reason: "Custom MCP servers can be configured for project-specific needs"

# Global access agents (can use any MCP)
global_access_agents:
  - librarian
  - project-owner
  - rubber-duck

# MCP configuration schema
schema:
  server:
    id: "string (unique identifier)"
    name: "string (display name)"
    type: "documentation | database | browser | filesystem | git | api_testing | custom"
    enabled: "boolean"
    access: "array of agent IDs"
    config: "object (server-specific configuration)"

# Node.js Version Requirements and nvm Compatibility
# IMPORTANT: MCP servers require Node.js 18+ with modern JavaScript features
node_requirements:
  minimum_version: "18.0.0"
  detection:
    - "Check current Node version: node --version"
    - "If using nvm: nvm current"
    - "Get full npx path: which npx"

  # For nvm users: MCP configs must use full paths and include PATH in env
  nvm_configuration:
    issue: "Using just 'npx' will use system default Node (may be outdated)"
    solution: "Use full path to npx from correct Node version + include PATH in env"
    example:
      command: "/Users/username/.nvm/versions/node/v22.22.0/bin/npx"
      env:
        PATH: "/Users/username/.nvm/versions/node/v22.22.0/bin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
        CONTEXT7_API_KEY: "${CONTEXT7_API_KEY}"

  # Generation instructions for /init
  generation_logic:
    - "Detect if nvm is installed (check ~/.nvm/ exists)"
    - "If nvm: get current Node version (nvm current)"
    - "If nvm: get full npx path (which npx or ~/.nvm/versions/node/{version}/bin/npx)"
    - "If nvm: build PATH env var with Node bin directory first"
    - "If not nvm: use 'npx' directly (assumes global Node 18+)"
    - "Validate Node version >= 18.0.0 before generating MCP configs"
    - "Warn user if Node < 18 and skip MCP generation"
