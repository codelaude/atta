# Database MCP
database_mcp:
  enabled_by_default: false
  priority: high
  description: "Query databases directly for schema inspection and validation"
  security_warning: "Database MCP will have read access to your data. Only enable if comfortable."

  postgresql:
    condition: has_postgresql
    connection_config:
      type: "postgresql"
      readonly: true
      require_ssl: false
    agents_with_access:
      - postgresql
      - be-team-lead
      - librarian
    recommendation_reason: "PostgreSQL detected - MCP can inspect schemas, validate queries, and check indexes"
    capabilities:
      - "Inspect table schemas"
      - "Validate query syntax"
      - "Check index usage"
      - "View constraints and relationships"

  mysql:
