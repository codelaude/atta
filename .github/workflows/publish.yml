name: Publish to npm

on:
  push:
    branches: [main]

concurrency:
  group: publish-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Check if version changed
        id: version
        run: |
          NAME=$(node -p "require('./package.json').name")
          CURRENT=$(node -p "require('./package.json').version")
          if PUBLISHED=$(npm view "$NAME" version 2>/dev/null); then
            if [ "$PUBLISHED" = "$CURRENT" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade npm for OIDC trusted publishing
        if: steps.version.outputs.skip == 'false'
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Install dependencies
        if: steps.version.outputs.skip == 'false'
        run: npm install

      - name: Run tests
        if: steps.version.outputs.skip == 'false'
        run: bash tests/check-all.sh

      - name: Publish with provenance
        if: steps.version.outputs.skip == 'false'
        run: npm publish --provenance

      - name: Create Git tag
        if: steps.version.outputs.skip == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists on remote, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(node -p 'require("./package.json").version')"
          HTTP_CODE=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" \
            --silent --include 2>&1 | head -1 | awk '{print $2}') || true
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Release $TAG already exists, skipping."
          elif [ "$HTTP_CODE" = "404" ]; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          else
            echo "::error::Unexpected response ($HTTP_CODE) checking release $TAG"
            exit 1
          fi
