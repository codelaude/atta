name: Publish to npm

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('ci-pr-{0}', github.ref) || 'publish-npm' }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install

      - name: Install Python test dependencies
        run: pip3 install pyyaml jsonschema

      - name: Run tests
        run: bash tests/check-all.sh

      - name: Check if version changed
        id: version
        if: github.event_name == 'push'
        run: |
          NAME=$(node -p "require('./package.json').name")
          CURRENT=$(node -p "require('./package.json').version")
          if PUBLISHED=$(npm view "$NAME" version 2>/dev/null); then
            if [ "$PUBLISHED" = "$CURRENT" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
            else
              echo "skip=false" >> "$GITHUB_OUTPUT"
              echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          fi

      - name: Upgrade npm for OIDC trusted publishing
        if: github.event_name == 'push' && steps.version.outputs.skip == 'false'
        run: |
          npm install -g npm@^11.5.1
          npm --version

      - name: Publish with provenance
        if: github.event_name == 'push' && steps.version.outputs.skip == 'false'
        run: npm publish --provenance

      - name: Create Git tag
        if: github.event_name == 'push' && steps.version.outputs.skip == 'false'
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "Tag $TAG already exists on remote, skipping."
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Create GitHub Release
        if: github.event_name == 'push' && steps.version.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(node -p 'require("./package.json").version')"
          API_STDERR=$(mktemp)
          HTTP_CODE=$(gh api "repos/${{ github.repository }}/releases/tags/$TAG" \
            --silent --include 2>"$API_STDERR" | head -1 | awk '{print $2}') || true
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Release $TAG already exists, skipping."
          elif [ "$HTTP_CODE" = "404" ]; then
            gh release create "$TAG" \
              --verify-tag \
              --title "$TAG" \
              --generate-notes
          else
            echo "::error::Unexpected response ($HTTP_CODE) checking release $TAG"
            cat "$API_STDERR" >&2
            exit 1
          fi
